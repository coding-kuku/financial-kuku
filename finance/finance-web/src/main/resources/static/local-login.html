<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悟空财务 - 登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 48px;
      width: 380px;
    }
    h1 { font-size: 22px; color: #333; margin-bottom: 32px; text-align: center; }
    .form-item { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d9d9d9; border-radius: 4px;
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #1890ff; }
    button {
      width: 100%; padding: 11px;
      background: #1890ff; color: #fff;
      border: none; border-radius: 4px;
      font-size: 14px; cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #40a9ff; }
    button:disabled { background: #a0c4f8; cursor: not-allowed; }
    .error {
      color: #ff4d4f; font-size: 13px;
      margin-top: 12px; text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>悟空财务管理系统</h1>
    <div class="form-item">
      <label>用户名</label>
      <input id="username" type="text" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button id="btn" onclick="doLogin()">登 录</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    // 按 Enter 触发登录
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('btn');
      var error = document.getElementById('error');

      if (!username || !password) {
        error.textContent = '请输入用户名和密码';
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      error.textContent = '';

      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json;charset=UTF-8' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.code === 0 && res.data) {
          var token = res.data;
          // 存入 localStorage（Lockr 使用的格式）
          localStorage.setItem('AUTH-TOKEN', JSON.stringify(token));
          // 存入 Cookie，有效期 365 天
          var expires = new Date(Date.now() + 365 * 24 * 3600 * 1000).toUTCString();
          document.cookie = 'AUTH-TOKEN=' + token + '; expires=' + expires + '; path=/';
          // 跳回主页
          window.location.href = '/';
        } else {
          error.textContent = res.msg || '登录失败';
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      })
      .catch(function() {
        error.textContent = '网络错误，请重试';
        btn.disabled = false;
        btn.textContent = '登 录';
      });
    }
  </script>
</body>
</html>
